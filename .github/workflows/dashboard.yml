name: dashboard

on:
  schedule:
    - cron: "7,37 11-22 * * 1-5"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - name: Gerar metrics.json a partir do ClickUp
        run: npm run build
        env:
          CLICKUP_TOKEN: ${{ secrets.CLICKUP_TOKEN }}
          CLICKUP_LIST_AVULSO: "901327620288"
          CLICKUP_LIST_CONECTA: "901327705932"
          CLICKUP_LIST_CPFL: "901327620289"
          CLICKUP_LIST_NEOENERGIA: "901327620291"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deploy
        uses: actions/deploy-pages@v4
